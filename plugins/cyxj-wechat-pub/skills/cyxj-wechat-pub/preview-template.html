<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeChat Article Preview</title>
  <style>
    body {
      background: #F2F2F2;
      margin: 0;
      padding: 40px 0;
    }
    .phone-frame {
      max-width: 420px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .phone-header {
      background: #EDEDED;
      padding: 12px 16px;
      font-size: 14px;
      color: #333;
      text-align: center;
      font-family: "PingFang SC", sans-serif;
      border-bottom: 1px solid #ddd;
    }
    #output {
      padding: 0;
    }
    /* Copy button */
    .copy-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      border-top: 1px solid #eee;
      padding: 12px;
      text-align: center;
      z-index: 100;
    }
    .copy-btn {
      background: #1565C0;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 48px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: "PingFang SC", sans-serif;
    }
    .copy-btn:hover {
      background: #0D47A1;
    }
    .copy-btn.copied {
      background: #2E7D32;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-header">WeChat Article Preview</div>
    <div id="output">
      {{CONTENT}}
    </div>
  </div>

  <div class="copy-bar">
    <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
  </div>

  <script>
    async function copyToClipboard() {
      const output = document.getElementById('output');
      const html = output.innerHTML;
      const btn = document.querySelector('.copy-btn');
      try {
        const blob = new Blob([html], { type: 'text/html' });
        await navigator.clipboard.write([
          new ClipboardItem({ 'text/html': blob })
        ]);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy to Clipboard';
          btn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        // Fallback: select and copy
        const range = document.createRange();
        range.selectNodeContents(output);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('copy');
        sel.removeAllRanges();
        btn.textContent = 'Copied (fallback)!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy to Clipboard';
          btn.classList.remove('copied');
        }, 2000);
      }
    }
  </script>
</body>
</html>
